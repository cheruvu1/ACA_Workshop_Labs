apiVersion: v1
kind: Pod
metadata:
  name: frontend-pod-secret
  labels: 
    app: frontend-label
    type: frontend
spec:
  containers:
    - name: frontend-pod
      image: myacrlab16284.azurecr.us/content-web:1.0-amd64
      ports:
        - containerPort: 3000
      envFrom:
        - secretRef:
            name: oracle-database-secret 
        - configMapRef:
            name: payment-processing-config

            