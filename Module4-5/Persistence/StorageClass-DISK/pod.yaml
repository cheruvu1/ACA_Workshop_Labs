kind: Pod
apiVersion: v1
metadata:
  name: my-app-pod
spec:
  containers:
  - name: my-container
    image: nginx
    volumeMounts:
    - mountPath: "/mnt/azure"   # Path inside the container
      name: storage-volume
  volumes:
  - name: storage-volume
    persistentVolumeClaim:
      claimName: my-azure-pvc  # Must match the PVC name from Step 2


